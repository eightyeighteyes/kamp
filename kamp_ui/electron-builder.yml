appId: com.kamp.app
productName: Kamp
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # Exclude binary build artifacts — handled by extraResources (copied directly
  # to Contents/Resources/ outside the ASAR, no double-packing).
  - '!resources/kamp/**'
  - '!resources/mpv'
  - '!resources/node'
  - '!resources/npm/**'
  - '!resources/icon_1024.png'
  # Explicitly include compiled JS (electron-vite output) so it is packed into
  # the ASAR. Without this, the positive 'extensions/**' pattern below changes
  # electron-builder's default glob behavior and out/ is not included.
  - 'out/**'
  - 'extensions/**'
asarUnpack:
  - resources/**
extraResources:
  # PyInstaller onedir bundle → Contents/Resources/kamp/
  - from: resources/kamp
    to: kamp
    filter:
      - '**/*'
  # Standalone mpv binary → Contents/Resources/mpv
  - from: resources/mpv
    to: mpv
  # Node.js binary + npm CLI — required for extension install/uninstall in the
  # packaged app where the user may not have Node.js on their machine.
  - from: resources/node
    to: node
  - from: resources/npm
    to: npm
    filter:
      - '**/*'
  # npm's own bundled node_modules — copied as a separate entry so app-builder
  # does not strip it (app-builder excludes node_modules from **/* by default).
  - from: resources/npm/node_modules
    to: npm/node_modules
    filter:
      - '**/*'
win:
  executableName: kamp
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - dmg
  entitlementsInherit: build/entitlements.mac.plist
  # Skip re-signing files under Contents/Resources/ — the PyInstaller bundle,
  # mpv, node, and npm are pre-signed in CI before electron-builder runs.
  # electron-builder only needs to sign the Electron binaries in
  # Contents/MacOS/ and Contents/Frameworks/. This reduces signing time from
  # ~1 hour to ~2 minutes on the PyInstaller bundle.
  # Skip re-signing files under Contents/Resources/ — the PyInstaller bundle,
  # mpv, node, and npm are pre-signed in CI before electron-builder runs.
  # electron-builder only needs to sign the Electron binaries in
  # Contents/MacOS/ and Contents/Frameworks/. This reduces signing time from
  # ~1 hour to ~2 minutes on the PyInstaller bundle.
  signIgnore:
    - "Contents/Resources/"
  # PyInstaller .so/.dylib files and mpv are arm64-only (built on the arm64 CI
  # runner). minimatch's ** does not cross dot-prefixed directories, so the
  # brace alternatives cover normal paths, dot items, and files inside dot dirs.
  x64ArchFiles: "Contents/Resources/{**,**/.*,**/.*/**}"
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  hardenedRuntime: true
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
